<!DOCTYPE html>
<html>
<head>
    <title>Cafe Menu</title>
</head>
<body>

<h1>Cafe Menu</h1>

{% for item in menu_items %}

    <h3>{{ item.name }}</h3>
    <p><strong>Category:</strong> {{ item.category.name }}</p>
    <p>{{ item.description }}</p>
    <p>Rs. {{ item.price }}</p>

{% endfor %}

</body>
</html>
