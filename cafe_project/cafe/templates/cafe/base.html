<!DOCTYPE html>
<html>
<head>
    <title>CafeFlow</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:20px;
        }

        .dashboard-container div {
            border: 1px solid black;
            border-radius: 8px;
            padding: 20px;
            width: 220px;
            background-color: #f9f9f9;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dashboard-container h3 {
            margin-bottom: 15px;
        }

        .dashboard-container p {
            font-size: 22px;
            font-weight: bold;
            margin: 0;
        }
        
        .navbar{
            padding:10px;
            background-color:lightgray;
        }

        .navbar a{
            margin-right:15px;
            text-decoration:none;
        }

        div{
            border:1px solid black;
            padding:15px;
            margin:10px;
        }

        h3{
            margin:0;
        }

        .btn-next {
            background-color: green;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }

        .btn-next:hover {
            background-color: darkgreen;
        }
    </style>

</head>

<body>

    {% if messages %}
        {% for message in messages %}
              <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
    
    <div class="navbar">
        <a href="/menu/" {% if request.path == "/menu/" %}style="font-weight:bold;"{% endif %}>Menu</a>
        <a href="/order/" {% if request.path == "/order/" %}style="font-weight:bold;"{% endif %}>Order</a>
        <a href="/orders/" {% if request.path == "/orders/" %}style="font-weight:bold;"{% endif %}>Orders</a>
        <a href="/dashboard/" {% if request.path == "/dashboard/" %}style="font-weight:bold;"{% endif %}>Dashboard</a>
    </div>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
