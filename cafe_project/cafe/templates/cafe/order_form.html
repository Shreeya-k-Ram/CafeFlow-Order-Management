<!DOCTYPE html>
<html>
    <style>
        .navbar {
            padding: 10px;
            background-color: lightgray;
        }
        
        .navbar a {
            margin-right: 15px;
            text-decoration: none;
        }
    </style>
<body>

    <div class="navbar">
        <a href="/menu/">Menu</a>
        <a href="/order/">Order</a>
        <a href="/orders/">Orders</a>
        <a href="/dashboard/">Dashboard</a>
    </div>
    
    <hr>

    <h1>Place Order</h1>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Place Order</button>
    </form>

</body>
</html>
